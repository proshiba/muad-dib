name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@54045abd5dcd3b0fee9ca02fa24c57545834c9cc # v4
        with:
          node-version: '20'
          registry-url: https://registry.npmjs.org
      - name: Verify no tarball contamination
        run: |
          # Guard 1: package/ directory must not exist (npm pack residue overwrites package.json in tarball)
          if [ -d "package" ]; then
            echo "::error::package/ directory found — this overwrites package.json in the published tarball. Remove it."
            exit 1
          fi
          # Guard 2: loadash typosquat must not be in dependencies (overrides is OK)
          if node -e "const d=require('./package.json').dependencies||{}; if(d.loadash){process.exit(1)}"; then
            echo "package.json dependencies: clean"
          else
            echo "::error::loadash typosquat found in package.json dependencies — aborting publish"
            exit 1
          fi
      - run: npm ci
      - run: npm test
      - name: Validate tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
