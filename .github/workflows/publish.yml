name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@54045abd5dcd3b0fee9ca02fa24c57545834c9cc # v4
        with:
          node-version: '20'
          registry-url: https://registry.npmjs.org
      - name: Pre-install check
        run: |
          echo "=== package.json BEFORE npm ci ==="
          cat package.json | grep -A 20 '"dependencies"'
          echo "=== loadash anywhere? ==="
          grep -r "loadash" . --include="*.json" -l || echo "NOT FOUND"
      - run: npm ci
      - name: Post-install check
        run: |
          echo "=== package.json AFTER npm ci ==="
          cat package.json | grep -A 20 '"dependencies"'
          echo "=== loadash in node_modules? ==="
          ls node_modules/loadash/package.json 2>/dev/null && cat node_modules/loadash/package.json | head -5 || echo "NOT FOUND"
          echo "=== npm pack dry run ==="
          npm pack --dry-run 2>&1 | head -5
          echo "=== diff package.json ==="
          git diff package.json || echo "NO DIFF"
      - name: Verify no typosquat contamination
        run: |
          if grep -q '"loadash"' package.json; then
            echo "::error::loadash typosquat detected in package.json — aborting publish"
            exit 1
          fi
      - run: npm test
      - name: Validate tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
