<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MUAD'DIB — npm Supply-Chain Threat Detection</title>
  <meta name="description" content="MUAD'DIB detects and responds to npm supply-chain attacks. Open-source CLI scanner and VS Code extension." />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      display: flex;
      flex-direction: column;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0b0f14;
      color: #e5e7eb;
      text-align: center;
      line-height: 1.6;
    }

    a {
      color: #e11d48;
      text-decoration: none;
      font-weight: bold;
    }

    a:hover {
      text-decoration: underline;
    }

    header {
      flex: 1; /* prend tout l’espace restant pour centrer le contenu verticalement */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem 1rem;
    }

    header img {
      width: 180px;
      margin-bottom: 1rem;
      border-radius: 12px;
    }

    h1 {
      margin: 0.5rem 0;
      font-size: 2.5rem;
      letter-spacing: 1px;
    }

    p.description {
      max-width: 600px;
      margin: 0.5rem auto 2rem;
      color: #9ca3af;
      font-size: 1.1rem;
    }

    .github-link {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.6rem 1.2rem;
      background: #e11d48;
      color: #fff;
      border-radius: 8px;
      transition: background 0.2s;
    }

    .github-link:hover {
      background: #be123c;
    }

    footer {
      padding: 1.5rem 1rem;
      color: #9ca3af;
      font-size: 0.9rem;
      border-top: 1px solid #1f2937;
    }
  </style>
</head>
<body>

  <!-- Header / Hero -->
  <header>
    <img src="https://i.imgur.com/bXUlPZ9.png" alt="MUAD'DIB Logo" />
    <h1>MUAD'DIB</h1>
    <p class="description">Supply-chain threat detection and response for npm. <br>Open-source CLI scanner and VS Code extension.</p>
    <a href="https://github.com/DNSZLSK/muad-dib" target="_blank" class="github-link">View the project on GitHub</a>
  </header>

  <!-- Footer -->
  <footer>
    &copy;The spice must flow. The worms must die.
  </footer>

</body>
</html>
